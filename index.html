<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jardin Cafe — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #f5f0e8;
      --dark: #1a1712;
      --sage: #7a8c6e;
      --gold: #c4a24a;
    }

    body {
      background: var(--cream);
      color: var(--dark);
      font-family: 'Cormorant Garamond', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 10;
      opacity: 0.4;
    }

    .frame {
      border: 1px solid rgba(26,23,18,0.15);
      position: fixed;
      inset: 20px;
      pointer-events: none;
      z-index: 5;
    }

    .corner {
      position: fixed;
      width: 30px;
      height: 30px;
      z-index: 6;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--gold);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }

    .corner.tl { top: 20px; left: 20px; }
    .corner.tr { top: 20px; right: 20px; transform: scaleX(-1); }
    .corner.bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
    .corner.br { bottom: 20px; right: 20px; transform: scale(-1); }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      animation: fadeIn 1.8s ease both;
      padding: 40px 20px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 18px;
      animation: fadeIn 1.8s 0.2s ease both;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    h1 em {
      font-style: italic;
      color: var(--sage);
    }

    .divider {
      width: 60px;
      height: 1px;
      background: var(--gold);
      margin: 28px auto;
      animation: expandIn 1.2s 0.6s ease both;
      transform-origin: center;
    }

    @keyframes expandIn {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }

    .photo-wrapper {
      position: relative;
      width: min(380px, 80vw);
      animation: fadeIn 1.8s 0.4s ease both;
    }

    .photo-wrapper::before {
      content: '';
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(196,162,74,0.3);
      z-index: -1;
    }

    .photo-wrapper img {
      width: 100%;
      display: block;
      filter: sepia(10%) contrast(1.02);
    }

    .under-construction {
      margin-top: 32px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      color: var(--dark);
      opacity: 0.75;
      letter-spacing: 0.04em;
      animation: fadeIn 1.8s 0.8s ease both;
    }

    .tagline {
      margin-top: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sage);
      animation: fadeIn 1.8s 1s ease both;
    }
  </style>
</head>
<body>
  <div class="frame"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="container">
    <p class="eyebrow">Est. 2026</p>
    <h1>Jardin <em>Cafe</em></h1>
    <div class="divider"></div>
    <div class="photo-wrapper">
      <img src="index.jpeg" alt="Jardin Cafe">
    </div>
    <p class="under-construction">Under Construction</p>
    <p class="tagline">Something beautiful is coming</p>
  </div>
</body>
</html>
